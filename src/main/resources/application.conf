ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }

    application {
        modules = [ com.example.ApplicationKt.module ]
    }

    database {
        # Configuración de ejemplo - usa variables de entorno en producción
        url = "jdbc:h2:mem:ktor_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL"
